# SPDX-License-Identifier: Apache-2.0
# Reputation scenario: agents trade and build/lose reputation.
name: reputation
description: "16 honest, 4 malicious traders, and 1 observer tracking reputation."

tier: 1
seed: 42

agents:
  count: 21
  brain: state-machine
  roles:
    - name: honest
      count: 16
    - name: malicious
      count: 4
    - name: observer
      count: 1

layers:
  transport: in_memory
  comms: nest_native
  identity: did_key
  registry: in_memory
  auth: jwt
  trust: score_average
  payments: prepaid_credits
  coordination: contract_net
  negotiation: alternating_offers
  memory: blackboard
  privacy: noop
  datafacts: datafacts_v1

task:
  type: reputation
  config:
    rounds: 5
    malicious_fraction: 0.2

failures:
  message_drop: 0.0

duration: "ticks: 10000"

metrics:
  - success_rate
  - message_count
  - agent_count

output:
  trace: ./traces/reputation.jsonl
