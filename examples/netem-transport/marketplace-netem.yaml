# SPDX-License-Identifier: Apache-2.0
# Marketplace scenario with the netem transport and a latency SLO.
name: marketplace-netem
description: "50 buyers and 50 sellers over a netem-shaped network."

tier: 1
seed: 42

agents:
  count: 100
  brain: state-machine
  roles:
    - name: buyer
      count: 50
    - name: seller
      count: 50

layers:
  transport: netem
  comms: nest_native
  identity: did_key
  registry: in_memory
  auth: jwt
  trust: score_average
  payments: prepaid_credits
  coordination: contract_net
  negotiation: alternating_offers
  memory: blackboard
  privacy: noop
  datafacts: datafacts_v1

transport:
  latency:
    kind: lognormal
    p50_ms: 20
    p99_ms: 200
  jitter_ms: 2
  bandwidth_kbps: 10000
  reorder_prob: 0.0
  drop_prob: 0.0
  seed_salt: 0

task:
  type: marketplace
  config:
    catalog_size: 200
    rounds: 10

failures:
  message_drop: 0.0

duration: "ticks: 20000"

metrics:
  - deal_rate
  - mean_latency
  - p50_latency
  - p95_latency
  - p99_latency
  - max_latency
  - message_count
  - dropped_count

slo:
  p99_latency: 0.250      # seconds (250ms)
  min_delivery_rate: 0.99

output:
  trace: ./traces/marketplace-netem.jsonl
  report: ./traces/marketplace-netem.html
