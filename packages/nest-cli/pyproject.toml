# SPDX-License-Identifier: Apache-2.0
[project]
name = "nest-cli"
version = "0.1.0"
description = "NEST CLI: nest run, nest bench, nest inspect, and more"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Testing",
    "Typing :: Typed",
]
dependencies = [
    "nest-core>=0.1.0",
    "nest-sdk>=0.1.0",
    "nest-plugins-reference>=0.1.0",
    "typer>=0.12",
]

[project.optional-dependencies]
llm = ["nest-shell[all]>=0.1.0"]

[project.scripts]
nest = "nest_cli.main:app"

[project.urls]
Homepage = "https://github.com/mariagorskikh/nest"
Repository = "https://github.com/mariagorskikh/nest"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nest_cli"]
